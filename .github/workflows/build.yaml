name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"  # Daily at 4:00 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix Node.js 20 deprecation warning

    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.ACCESS_TOKEN }}" ]; then
            echo "::error::ACCESS_TOKEN secret is missing. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.USER_NAME }}" ]; then
            echo "::error::USER_NAME secret is missing. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "Secrets configured ✓"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r cache/requirements.txt

      - name: Update SVG stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "chore: update README stats"
          git push
